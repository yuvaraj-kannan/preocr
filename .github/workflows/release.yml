name: Release

# DISABLED: Using ci-cd-release.yml for publishing instead
# ci-cd-release.yml handles: version-bump → lint → test → summary → tag → publish
# This workflow is completely disabled to avoid duplication
on:
  workflow_dispatch:  # Manual trigger only, but workflow is disabled

jobs:
  version-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic>=2.0.0
      
      - name: Extract version from version.py
        id: version
        run: |
          VERSION=$(python -c "exec(open('preocr/version.py').read()); print(__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"
      
      - name: Get git tag
        id: tag
        run: |
          TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "No tag found for this commit"
            exit 1
          fi
          # Remove 'v' prefix if present
          TAG_VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Git tag: $TAG"
      
      - name: Validate version consistency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_VERSION="${{ steps.tag.outputs.tag_version }}"
          
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Version mismatch!"
            echo "Version in version.py: $VERSION"
            echo "Version in git tag: $TAG_VERSION"
            exit 1
          fi
          
          echo "✓ Version consistency check passed"
      
      - name: Install tomli for Python < 3.11
        run: |
          python -c "import sys; exit(0 if sys.version_info >= (3, 11) else 1)" || pip install --quiet tomli
      
      - name: Validate version in pyproject.toml
        run: |
          python -c "
          import sys
          exec(open('preocr/version.py').read())
          
          # Use tomllib for Python >= 3.11, tomli for older versions
          if sys.version_info >= (3, 11):
              import tomllib
              with open('pyproject.toml', 'rb') as f:
                  config = tomllib.load(f)
          else:
              import tomli
              with open('pyproject.toml', 'rb') as f:
                  config = tomli.load(f)
          
          # Check that pyproject.toml uses dynamic version (not static)
          project_config = config.get('project', {})
          if 'version' in project_config:
              print(f'ERROR: pyproject.toml should use dynamic version, not static!')
              print(f'Found static version: {project_config[\"version\"]}')
              exit(1)
          
          if 'dynamic' not in project_config or 'version' not in project_config['dynamic']:
              print(f'ERROR: pyproject.toml should have dynamic = [\"version\"]')
              exit(1)
          
          # Check that setuptools.dynamic.version is configured
          setuptools_config = config.get('tool', {}).get('setuptools', {})
          dynamic_config = setuptools_config.get('dynamic', {})
          if 'version' not in dynamic_config:
              print(f'ERROR: tool.setuptools.dynamic.version not configured')
              exit(1)
          
          print(f'✓ pyproject.toml correctly uses dynamic version from version.py: {__version__}')
          "
      
      - name: Validate version in __init__.py
        run: |
          python -c "
          exec(open('preocr/version.py').read())
          version_py = __version__
          import re
          with open('preocr/__init__.py') as f:
              m = re.search(r'from \\.version import __version__', f.read())
          assert m, '__init__.py should re-export __version__ from .version'
          print(f'✓ __init__.py imports version from version.py: {version_py}')
          "

  build-and-publish:
    needs: version-validation
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating GitHub Releases
      id-token: write  # Required for trusted publishing to PyPI
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Run tests
        run: |
          pip install -e ".[dev]"
          pytest
      
      - name: Verify version before build
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          CODE_VERSION=$(python -c "exec(open('preocr/version.py').read()); print(__version__)")
          echo "Tag version: $TAG_VERSION"
          echo "Code version: $CODE_VERSION"
          if [ "$TAG_VERSION" != "$CODE_VERSION" ]; then
            echo "ERROR: Code version ($CODE_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version check passed: $CODE_VERSION"
      
      - name: Build package
        run: |
          rm -rf dist/ build/ *.egg-info || true
          python -m build
          echo "Built packages:"
          ls -lh dist/
      
      - name: Check package
        run: |
          twine check dist/*
      
      - name: Verify built package version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          # Extract version from built wheel filename
          WHEEL_FILE=$(ls dist/*.whl 2>/dev/null | head -1)
          if [ -z "$WHEEL_FILE" ]; then
            echo "ERROR: No wheel file found in dist/"
            exit 1
          fi
          echo "Wheel file: $WHEEL_FILE"
          # Extract version from filename: preocr-X.Y.Z-py3-none-any.whl
          WHEEL_VERSION=$(echo "$WHEEL_FILE" | sed -n 's/.*preocr-\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p')
          echo "Wheel version: $WHEEL_VERSION"
          echo "Tag version: $TAG_VERSION"
          if [ "$WHEEL_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Built package version ($WHEEL_VERSION) doesn't match tag ($TAG_VERSION)"
            echo "This should not happen - the build is using wrong version!"
            exit 1
          fi
          echo "✓ Built package version matches tag: $WHEEL_VERSION"
      
      - name: Validate release files exist
        run: |
          TAG="${{ github.ref_name }}"
          JSON_FILE="releases/${TAG}.json"
          MD_FILE="releases/${TAG}.md"
          
          if [ ! -f "$JSON_FILE" ]; then
            echo "ERROR: Release JSON file not found: $JSON_FILE"
            echo "Please ensure release files are generated before creating a release."
            exit 1
          fi
          
          if [ ! -f "$MD_FILE" ]; then
            echo "WARNING: Release Markdown file not found: $MD_FILE"
            echo "Continuing with JSON file only..."
          fi
          
          echo "✓ Release files validated"
      
      - name: Generate release notes from JSON
        id: release_notes
        run: |
          TAG="${{ github.ref_name }}"
          JSON_FILE="releases/${TAG}.json"
          
          # Convert JSON to markdown format for GitHub Release
          python -c "
          import json
          import sys
          
          with open('$JSON_FILE') as f:
              data = json.load(f)
          
          notes = f\"# Release {data['tag']}\\n\\n\"
          notes += f\"**Release Date**: {data['release_date']}\\n\\n\"
          
          changes = data.get('changes', {})
          if changes:
              notes += \"## Changes\\n\\n\"
              
              # Standard section order
              section_order = ['added', 'changed', 'deprecated', 'removed', 'fixed', 'security', 'performance']
              section_titles = {
                  'added': 'Added',
                  'changed': 'Changed',
                  'deprecated': 'Deprecated',
                  'removed': 'Removed',
                  'fixed': 'Fixed',
                  'security': 'Security',
                  'performance': 'Performance'
              }
              
              for section_key in section_order:
                  if section_key in changes and changes[section_key]:
                      notes += f\"### {section_titles.get(section_key, section_key.title())}\\n\\n\"
                      for item in changes[section_key]:
                          notes += f\"- {item}\\n\"
                      notes += \"\\n\"
              
              # Add any other sections
              for section_key, items in changes.items():
                  if section_key not in section_order and items:
                      notes += f\"### {section_key.title()}\\n\\n\"
                      for item in items:
                          notes += f\"- {item}\\n\"
                      notes += \"\\n\"
          
          # Add artifacts
          artifacts = data.get('artifacts', {})
          if artifacts:
              notes += \"## Artifacts\\n\\n\"
              if artifacts.get('pypi'):
                  notes += f\"- PyPI: {artifacts['pypi']}\\n\"
              if artifacts.get('github'):
                  notes += f\"- GitHub Release: {artifacts['github']}\\n\"
              notes += \"\\n\"
          
          with open('release_notes.txt', 'w') as f:
              f.write(notes)
          
          print('Release notes generated')
          "
          echo "notes_file=release_notes.txt" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

