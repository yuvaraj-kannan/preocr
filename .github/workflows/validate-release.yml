name: Validate Release Files

# This workflow validates that release files exist and are properly formatted
# when version changes are detected

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-release:
    runs-on: ubuntu-latest
    # Only run if version.py was changed or if release files were changed
    if: |
      contains(github.event.pull_request.title, 'bump version') ||
      contains(join(github.event.pull_request.changed_files || github.event.head_commit.modified || []), 'version.py') ||
      contains(join(github.event.pull_request.changed_files || github.event.head_commit.modified || []), 'CHANGELOG.md') ||
      contains(join(github.event.pull_request.changed_files || github.event.head_commit.modified || []), 'releases/')
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Extract version from version.py
        id: version
        run: |
          VERSION=$(python -c "exec(open('preocr/version.py').read()); print(__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"
      
      - name: Check if version exists in CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG="docs/CHANGELOG.md"
          
          if ! grep -q "^## \[$VERSION\]" "$CHANGELOG"; then
            echo "ERROR: Version $VERSION not found in CHANGELOG.md"
            echo "Please add a version entry to CHANGELOG.md before creating a release."
            exit 1
          fi
          
          echo "✓ Version $VERSION found in CHANGELOG.md"
      
      - name: Validate release files exist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"
          JSON_FILE="releases/${TAG}.json"
          MD_FILE="releases/${TAG}.md"
          
          # Check if files exist
          if [ ! -f "$JSON_FILE" ]; then
            echo "WARNING: Release JSON file not found: $JSON_FILE"
            echo "Release files will be auto-generated on merge, but you can generate them manually:"
            echo "  python scripts/generate_release.py $VERSION"
          else
            echo "✓ Release JSON file exists: $JSON_FILE"
          fi
          
          if [ ! -f "$MD_FILE" ]; then
            echo "WARNING: Release Markdown file not found: $MD_FILE"
            echo "Release files will be auto-generated on merge, but you can generate them manually:"
            echo "  python scripts/generate_release.py $VERSION"
          else
            echo "✓ Release Markdown file exists: $MD_FILE"
          fi
      
      - name: Validate JSON schema
        if: hashFiles('releases/v*.json') != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"
          JSON_FILE="releases/${TAG}.json"
          
          if [ -f "$JSON_FILE" ]; then
            python -c "
            import json
            import sys
            
            try:
                with open('$JSON_FILE') as f:
                    data = json.load(f)
                
                # Validate required fields
                required_fields = ['version', 'tag', 'release_date', 'status', 'changes']
                missing_fields = [field for field in required_fields if field not in data]
                
                if missing_fields:
                    print(f'ERROR: Missing required fields in JSON: {missing_fields}')
                    sys.exit(1)
                
                # Validate version matches
                if data['version'] != '$VERSION':
                    print(f'ERROR: Version mismatch in JSON: expected $VERSION, got {data[\"version\"]}')
                    sys.exit(1)
                
                # Validate tag format
                expected_tag = 'v$VERSION'
                if data['tag'] != expected_tag:
                    print(f'ERROR: Tag mismatch in JSON: expected {expected_tag}, got {data[\"tag\"]}')
                    sys.exit(1)
                
                # Validate status
                if data['status'] not in ['released', 'draft', 'prerelease']:
                    print(f'WARNING: Unexpected status value: {data[\"status\"]}')
                
                print('✓ JSON schema validation passed')
                
            except json.JSONDecodeError as e:
                print(f'ERROR: Invalid JSON in {JSON_FILE}: {e}')
                sys.exit(1)
            except Exception as e:
                print(f'ERROR: Validation failed: {e}')
                sys.exit(1)
            "
          else
            echo "Skipping JSON validation (file not found, will be generated on merge)"
          fi
      
      - name: Validate CHANGELOG and releases sync
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from scripts.generate_release import parse_changelog
          from pathlib import Path
          import json
          
          changelog_path = Path('docs/CHANGELOG.md')
          versions = parse_changelog(changelog_path)
          
          # Get all release files
          releases_dir = Path('releases')
          release_versions = set()
          if releases_dir.exists():
              for json_file in releases_dir.glob('v*.json'):
                  try:
                      data = json.loads(json_file.read_text())
                      release_versions.add(data['version'])
                  except Exception:
                      continue
          
          # Check for versions in CHANGELOG without release files (excluding Unreleased)
          changelog_versions = {v for v in versions.keys() if v.lower() != 'unreleased'}
          missing_releases = changelog_versions - release_versions
          
          if missing_releases:
              print(f'WARNING: Versions in CHANGELOG.md without release files: {sorted(missing_releases)}')
              print('These will be generated automatically on merge.')
          else:
              print('✓ All CHANGELOG versions have corresponding release files')
          "
      
      - name: Summary
        run: |
          echo "## Release Validation Summary"
          echo ""
          echo "✓ Version found in CHANGELOG.md"
          echo "✓ Release files validated (or will be auto-generated)"
          echo ""
          echo "If release files are missing, they will be automatically generated"
          echo "when the version bump PR is merged."

